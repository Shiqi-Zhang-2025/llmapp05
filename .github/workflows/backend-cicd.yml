name: Backend CI/CD Pipeline

# 当有代码推送到 main 分支，且修改了 llm-python 文件夹下的内容时触发
on:
  push:
    branches: [ "main" ]
    paths:
      - 'llm-python/**'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          cd llm-python
          # 构建镜像并打上 latest 标签
          docker build -t therealusera/llm-python:latest .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'therealusera/llm-python:latest'
          format: 'table'
          # 如果发现严重漏洞 (CRITICAL,HIGH)，流水线不会直接中断退出 (根据课件要求，可配置退出码)
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: $therealusera
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to Docker Hub
        run: |
          # 将通过扫描的镜像推送到你的 Docker Hub 仓库
          docker push therealusera/llm-python:latest