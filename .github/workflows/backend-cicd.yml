name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  # 新增：允许在 GitHub Actions 页面手动点击触发运行，方便调试
  workflow_dispatch: 

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          cd llm-python
          # 【硬编码】直接写死你的 Docker ID 和镜像名
          docker build -t 'therealusera/llm-python:latest' .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          # 【硬编码】直接扫描指定的镜像名 [cite: 912]
          image-ref: 'therealusera/llm-python:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # 【硬编码】直接写死用户名
          username: 'therealusera'
          # 【唯一 Secret】密码必须通过 Secret 读取
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to Docker Hub
        run: |
          # 【硬编码】将构建并扫描通过的镜像推送到 Docker Hub [cite: 1155, 1156]
          docker push 'therealusera/llm-python:latest'